server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: search-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/search_db}
    username: ${DB_USERNAME:quickbite}
    password: ${DB_PASSWORD:quickbite}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:search-service}
      auto-offset-reset: earliest

# Topics this service consumes (PLATFORM_SPEC §5). The index is built primarily from events.
quickbite:
  topics:
    restaurant-events: restaurant.events
    menu-events: menu.events

# URLs of synchronous dependency services (PLATFORM_SPEC §1.1: restaurant, menu).
# Cross-service calls only ever hit the target's /internal/** endpoints. Used to backfill
# the index when an event is missed or arrives before its parent (e.g. menu item before restaurant).
clients:
  restaurant:
    url: ${RESTAURANT_URL:http://localhost:8082}
  menu:
    url: ${MENU_URL:http://localhost:8083}

# Resilience4j circuit breakers guarding the Feign clients.
resilience4j:
  circuitbreaker:
    instances:
      restaurant-service:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      menu-service:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  timelimiter:
    instances:
      restaurant-service:
        timeout-duration: 3s
      menu-service:
        timeout-duration: 3s

feign:
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
