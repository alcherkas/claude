server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # remoteEntry.js and other federation assets must be loadable cross-origin
    # by the shell host.
    location /assets/ {
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # SPA history fallback — all client routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
