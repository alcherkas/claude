server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: pricing-service

# URLs of the services this stateless service depends on (menu + promotion).
# Defaults are the local direct ports; overridden per environment / in compose.
clients:
  menu:
    url: ${CLIENTS_MENU_URL:http://localhost:8083}
  promotion:
    url: ${CLIENTS_PROMOTION_URL:http://localhost:8087}

# Feign + Resilience4j circuit breakers around the outbound clients.
feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      MenuClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      PromotionClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
