server:
  port: ${SERVER_PORT:8092}

spring:
  application:
    name: delivery-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/delivery_db}
    username: ${DB_USER:quickbite}
    password: ${DB_PASSWORD:quickbite}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:delivery-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Outbound dependencies (Feign). Each targets the dependency's /internal/** API.
clients:
  order:
    url: ${CLIENTS_ORDER_URL:http://localhost:8088}
  driver:
    url: ${CLIENTS_DRIVER_URL:http://localhost:8091}

# Kafka topics this service interacts with
kafka:
  topics:
    deliveries-events: ${KAFKA_TOPIC_DELIVERIES_EVENTS:deliveries.events}
    orders-events: ${KAFKA_TOPIC_ORDERS_EVENTS:orders.events}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      orderClient: { baseConfig: default }
      driverClient: { baseConfig: default }

feign:
  circuitbreaker:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
