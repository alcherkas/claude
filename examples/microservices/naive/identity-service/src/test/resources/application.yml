spring:
  datasource:
    url: jdbc:h2:mem:identity_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

security:
  jwt:
    secret: test-secret-test-secret-test-secret-32bytes-min
    issuer: quickbite-identity
    ttl-seconds: 3600
