server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_USER:quickbite}
    password: ${DB_PASSWORD:quickbite}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:order-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Outbound dependencies (Feign). Each targets the dependency's /internal/** API.
clients:
  cart:
    url: ${CLIENTS_CART_URL:http://localhost:8085}
  pricing:
    url: ${CLIENTS_PRICING_URL:http://localhost:8086}
  menu:
    url: ${CLIENTS_MENU_URL:http://localhost:8083}
  restaurant:
    url: ${CLIENTS_RESTAURANT_URL:http://localhost:8082}
  identity:
    url: ${CLIENTS_IDENTITY_URL:http://localhost:8081}

# Kafka topics this service interacts with
kafka:
  topics:
    orders-events: ${KAFKA_TOPIC_ORDERS_EVENTS:orders.events}
    payments-events: ${KAFKA_TOPIC_PAYMENTS_EVENTS:payments.events}
    deliveries-events: ${KAFKA_TOPIC_DELIVERIES_EVENTS:deliveries.events}

# Order-level money knobs
order:
  currency: ${ORDER_CURRENCY:USD}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      cartClient: { baseConfig: default }
      pricingClient: { baseConfig: default }
      menuClient: { baseConfig: default }
      restaurantClient: { baseConfig: default }
      identityClient: { baseConfig: default }

feign:
  circuitbreaker:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
