openapi: 3.0.3
info:
  title: QuickBite order-service API
  version: 1.0.0
  description: >
    Central checkout hub. Creates orders from a cart snapshot, prices them via pricing-service,
    persists a pricing snapshot, and emits OrderCreated / OrderStatusChanged on orders.events.
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8088
    description: Local direct
  - url: http://localhost:8080
    description: Through the API gateway (prefix /api preserved)
tags:
  - name: orders
    description: Public order endpoints (gateway /api/orders/**)

paths:
  /api/orders:
    post:
      tags: [orders]
      summary: Create an order from the user's cart snapshot
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '422':
          description: Validation error (empty cart, inactive restaurant, unknown user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: A required dependency is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [orders]
      summary: List orders for a user
      operationId: listOrdersByUser
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Orders for the user, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

  /api/orders/{id}:
    get:
      tags: [orders]
      summary: Get an order by id
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{id}/status:
    patch:
      tags: [orders]
      summary: Update order status (emits OrderStatusChanged)
      operationId: updateOrderStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    OrderStatus:
      type: string
      enum: [CREATED, CONFIRMED, PREPARING, READY, PICKED_UP, DELIVERED, CANCELLED]
    CreateOrderRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        promoCode:
          type: string
          nullable: true
        tipCents:
          type: integer
          format: int64
          nullable: true
          description: Optional courier tip in cents (null treated as 0).
    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
    OrderItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        menuItemId:
          type: string
          format: uuid
        name:
          type: string
        qty:
          type: integer
        unitPriceCents:
          type: integer
          format: int64
    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/OrderStatus'
        subtotalCents:
          type: integer
          format: int64
        deliveryFeeCents:
          type: integer
          format: int64
        serviceFeeCents:
          type: integer
          format: int64
        taxCents:
          type: integer
          format: int64
        discountCents:
          type: integer
          format: int64
        tipCents:
          type: integer
          format: int64
        totalCents:
          type: integer
          format: int64
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
