openapi: 3.0.3
info:
  title: QuickBite Promotion Service API
  description: Promo code management, validation and redemption reservation.
  version: 1.0.0
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8087
    description: Local direct
  - url: http://localhost:8080
    description: Via API gateway (public /api routes only)
tags:
  - name: promotions
    description: Public promotion endpoints (exposed via gateway under /api/promotions)
paths:
  /api/promotions:
    post:
      tags: [promotions]
      summary: Create a promotion
      operationId: createPromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromotionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
    get:
      tags: [promotions]
      summary: List all promotions
      operationId: listPromotions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromotionResponse'
  /api/promotions/validate:
    get:
      tags: [promotions]
      summary: Validate a promo code against a subtotal (and optional user)
      operationId: validatePromotion
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: subtotalCents
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
components:
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    PromotionType:
      type: string
      enum: [PERCENT, FIXED, FREE_DELIVERY]
    CreatePromotionRequest:
      type: object
      required: [code, type, value, minSubtotalCents, validFrom, validTo]
      properties:
        code:
          type: string
        type:
          $ref: '#/components/schemas/PromotionType'
        value:
          type: integer
          format: int64
          description: Percent (0-100) for PERCENT, cents for FIXED, ignored for FREE_DELIVERY.
        minSubtotalCents:
          type: integer
          format: int64
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
          nullable: true
        perUserLimit:
          type: integer
          nullable: true
        active:
          type: boolean
          nullable: true
    PromotionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        type:
          $ref: '#/components/schemas/PromotionType'
        value:
          type: integer
          format: int64
        minSubtotalCents:
          type: integer
          format: int64
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
          nullable: true
        perUserLimit:
          type: integer
          nullable: true
        active:
          type: boolean
    ValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        type:
          $ref: '#/components/schemas/PromotionType'
        discountCents:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
