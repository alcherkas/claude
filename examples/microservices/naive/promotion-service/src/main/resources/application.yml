server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: promotion-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/promotion_db}
    username: ${DB_USERNAME:promotion}
    password: ${DB_PASSWORD:promotion}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# Sync dependencies (Feign). identity is an optional target for user verification.
clients:
  identity:
    url: ${IDENTITY_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    instances:
      identity:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

feign:
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
