openapi: 3.0.3
info:
  title: QuickBite Menu Service API
  version: 1.0.0
  description: >
    Manages restaurant menu items. Public endpoints are reached through the API gateway
    at /api/menu/**. Creating an item validates that the owning restaurant exists and is
    ACTIVE via restaurant-service; create/update emit MenuItemUpserted on the menu.events
    Kafka topic.
servers:
  - url: http://localhost:8083
    description: Direct (local)
  - url: http://localhost:8080
    description: Via API gateway
tags:
  - name: menu
    description: Public menu API
paths:
  /api/menu:
    post:
      tags: [menu]
      summary: Create a menu item
      operationId: createMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuItemRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
    get:
      tags: [menu]
      summary: List menu items for a restaurant
      operationId: listMenuItems
      parameters:
        - name: restaurantId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/menu/{id}:
    get:
      tags: [menu]
      summary: Get a menu item by id
      operationId: getMenuItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/menu/{id}/availability:
    patch:
      tags: [menu]
      summary: Update availability of a menu item
      operationId: updateMenuItemAvailability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAvailabilityRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateMenuItemRequest:
      type: object
      required: [restaurantId, name, priceCents, currency, category]
      properties:
        restaurantId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        priceCents:
          type: integer
          format: int64
          minimum: 0
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          example: EUR
        category:
          type: string
          maxLength: 100
        available:
          type: boolean
          default: true
    UpdateAvailabilityRequest:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
    MenuItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
          format: int64
        currency:
          type: string
        category:
          type: string
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
