server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${DB_USER:quickbite}
    password: ${DB_PASSWORD:quickbite}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Outbound dependencies (Feign). Each targets the dependency's /internal/** API.
clients:
  order:
    url: ${CLIENTS_ORDER_URL:http://localhost:8088}
  wallet:
    url: ${CLIENTS_WALLET_URL:http://localhost:8090}
  identity:
    url: ${CLIENTS_IDENTITY_URL:http://localhost:8081}

# Kafka topics this service interacts with
kafka:
  topics:
    payments-events: ${KAFKA_TOPIC_PAYMENTS_EVENTS:payments.events}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      orderClient: { baseConfig: default }
      walletClient: { baseConfig: default }
      identityClient: { baseConfig: default }

feign:
  circuitbreaker:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
