server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: cart-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_db}
    username: ${DB_USER:cart}
    password: ${DB_PASSWORD:cart}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# URLs of dependency services (cross-service calls only hit /internal/**).
clients:
  menu:
    url: ${MENU_URL:http://localhost:8083}
  identity:
    url: ${IDENTITY_URL:http://localhost:8081}

# Resilience4j circuit breakers guarding the Feign clients.
resilience4j:
  circuitbreaker:
    instances:
      menu-service:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      identity-service:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  timelimiter:
    instances:
      menu-service:
        timeout-duration: 3s
      identity-service:
        timeout-duration: 3s

feign:
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
