server:
  port: ${SERVER_PORT:8094}

spring:
  application:
    name: review-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/review_db}
    username: ${DB_USER:quickbite}
    password: ${DB_PASSWORD:quickbite}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# Outbound dependencies (Feign). Each targets the dependency's /internal/** API.
clients:
  order:
    url: ${CLIENTS_ORDER_URL:http://localhost:8088}
  restaurant:
    url: ${CLIENTS_RESTAURANT_URL:http://localhost:8082}
  identity:
    url: ${CLIENTS_IDENTITY_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      orderClient: { baseConfig: default }
      restaurantClient: { baseConfig: default }
      identityClient: { baseConfig: default }

feign:
  circuitbreaker:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
