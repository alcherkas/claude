server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USERNAME:identity}
    password: ${DB_PASSWORD:identity}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Shared HS256 secret — gateway and every downstream service trust tokens signed with this.
security:
  jwt:
    secret: ${JWT_SECRET:change-me-quickbite-shared-dev-secret-please-rotate-32b}
    issuer: ${JWT_ISSUER:quickbite-identity}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
