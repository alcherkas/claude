spring:
  datasource:
    url: jdbc:h2:mem:search_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: search-service-test
      auto-offset-reset: earliest

# Dependency URLs are never actually called in tests; the Feign clients just need a base URL.
clients:
  restaurant:
    url: http://localhost:8082
  menu:
    url: http://localhost:8083

feign:
  circuitbreaker:
    enabled: true
