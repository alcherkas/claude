<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Agent Debate Stage</title>
<style>
  :root {
    --bg: #0d1017;
    --panel: #161a23;
    --panel-2: #1c212d;
    --border: #2a2f3d;
    --text: #e6e7ea;
    --muted: #8a90a0;
    --accent: #ffaa44;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    overflow: hidden;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    height: 100vh;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel-2);
  }
  .panel-title {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.3px;
  }
  .panel-subtitle {
    color: var(--muted);
    font-size: 12px;
  }
  .badge {
    background: var(--accent);
    color: #1a1a1a;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    min-height: 0;
  }
  .panel-body::-webkit-scrollbar { width: 8px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Panel A — chat */
  .chat-msg {
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    border-left: 4px solid var(--muted);
    background: rgba(255,255,255,0.03);
    animation: fadeIn 0.3s ease;
  }
  .chat-meta {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-from {
    font-weight: 700;
    font-size: 13px;
  }
  .chat-arrow { color: var(--muted); }
  .chat-kind {
    background: rgba(255,255,255,0.06);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chat-time { margin-left: auto; }
  .chat-body {
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Panel C — decisions */
  .decision {
    margin-bottom: 10px;
    padding: 10px 12px;
    border-radius: 7px;
    background: rgba(255,255,255,0.025);
    font-size: 13px;
    border-left: 4px solid var(--muted);
    animation: fadeIn 0.3s ease;
  }
  .decision-row { display: flex; align-items: baseline; gap: 6px; }
  .decision-agent { font-weight: 700; }
  .decision-verb { color: var(--muted); font-size: 12px; }
  .decision-action { font-weight: 500; }
  .decision-time { margin-left: auto; font-size: 11px; color: var(--muted); }
  .decision-reason {
    color: var(--muted);
    font-style: italic;
    margin-top: 5px;
    font-size: 12px;
    line-height: 1.5;
  }

  /* Panel D — agents */
  .agent-card {
    padding: 10px 14px;
    margin-bottom: 8px;
    border-radius: 7px;
    border-left: 4px solid var(--muted);
    background: rgba(255,255,255,0.03);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideIn 0.5s ease;
  }
  .agent-name { font-weight: 700; font-size: 14px; }
  .agent-tag {
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Mermaid */
  #graph-container {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #graph-container svg { max-width: 100%; max-height: 100%; }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">A · Debate Chat</span>
      <span class="panel-subtitle"><span id="chat-count">0</span> messages</span>
    </div>
    <div class="panel-body" id="chat">
      <div class="empty">No messages yet — waiting for the debate to start.</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">B · Live Roster &amp; Spawn Graph</span>
      <span class="panel-subtitle"><span id="edge-count">0</span> edges</span>
    </div>
    <div class="panel-body" id="graph-container">
      <div class="empty">No agents on stage yet.</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">C · Decision Log</span>
      <span class="panel-subtitle"><span id="decision-count">0</span> decisions</span>
    </div>
    <div class="panel-body" id="decisions">
      <div class="empty">No decisions logged yet.</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">D · Witness Stand</span>
      <span class="panel-subtitle"><span id="agent-count">0</span> agents</span>
    </div>
    <div class="panel-body" id="agents">
      <div class="empty">.claude/agents/ is empty.</div>
    </div>
  </div>
</div>

<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

const COLORS = {
  judge:            '#f5c518',
  'debater-pro':    '#4a90ff',
  'debater-con':    '#ff5a5a',
  researcher:       '#45c87b',
  'expert-witness': '#b07cf5',
  orchestrator:     '#ffaa44',
};
const PALETTE = ['#7bd1f5', '#f57bb6', '#a3f57b', '#f5d97b', '#7bf5d1', '#f59e7b'];
function colorOf(name) {
  if (!name) return '#8a90a0';
  if (COLORS[name]) return COLORS[name];
  // Match prefixes (e.g., expert-witness-database → witness color base)
  for (const k of Object.keys(COLORS)) {
    if (name.startsWith(k + '-')) return COLORS[k];
  }
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

const messages = [];
const decisions = [];
const agents = new Map();
const edges = new Map();

const chatEl = document.getElementById('chat');
const decisionsEl = document.getElementById('decisions');
const agentsEl = document.getElementById('agents');
const graphEl = document.getElementById('graph-container');

function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return String(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function clearEmpty(el) {
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();
}

function addMessage(m) {
  messages.push(m);
  clearEmpty(chatEl);
  const c = colorOf(m.from);
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.style.borderLeftColor = c;
  const toHtml = m.to
    ? `<span class="chat-arrow">→</span><span class="chat-from" style="color:${colorOf(m.to)}">${escape(m.to)}</span>`
    : '';
  const kindHtml = m.kind ? `<span class="chat-kind">${escape(m.kind)}</span>` : '';
  div.innerHTML = `
    <div class="chat-meta">
      <span class="chat-from" style="color:${c}">${escape(m.from || '?')}</span>
      ${toHtml}
      ${kindHtml}
      <span class="chat-time">${escape(fmtTime(m.ts))}</span>
    </div>
    <div class="chat-body">${escape(m.body || '')}</div>
  `;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  document.getElementById('chat-count').textContent = String(messages.length);

  if (m.from && m.to) {
    const key = `${m.from}->${m.to}`;
    edges.set(key, (edges.get(key) || 0) + 1);
    document.getElementById('edge-count').textContent = String(edges.size);
    scheduleGraphRender();
  }
}

function addDecision(d) {
  decisions.push(d);
  clearEmpty(decisionsEl);
  const c = colorOf(d.agent);
  const div = document.createElement('div');
  div.className = 'decision';
  div.style.borderLeftColor = c;
  div.innerHTML = `
    <div class="decision-row">
      <span class="decision-agent" style="color:${c}">${escape(d.agent || '?')}</span>
      <span class="decision-verb">decided to</span>
      <span class="decision-action">${escape(d.decision || '')}</span>
      <span class="decision-time">${escape(fmtTime(d.ts))}</span>
    </div>
    ${d.reason ? `<div class="decision-reason">${escape(d.reason)}</div>` : ''}
  `;
  decisionsEl.appendChild(div);
  decisionsEl.scrollTop = decisionsEl.scrollHeight;
  document.getElementById('decision-count').textContent = String(decisions.length);
}

function addAgent(a) {
  if (agents.has(a.name)) return;
  agents.set(a.name, a);
  clearEmpty(agentsEl);
  const c = colorOf(a.name);
  const div = document.createElement('div');
  div.className = 'agent-card';
  div.dataset.name = a.name;
  div.style.borderLeftColor = c;
  div.innerHTML = `
    <span class="agent-name" style="color:${c}">${escape(a.name)}</span>
    <span class="agent-tag">${escape(a.file)}</span>
  `;
  agentsEl.appendChild(div);
  document.getElementById('agent-count').textContent = String(agents.size);
  scheduleGraphRender();
}

function removeAgent(a) {
  if (!agents.has(a.name)) return;
  agents.delete(a.name);
  const node = agentsEl.querySelector(`[data-name="${CSS.escape(a.name)}"]`);
  if (node) node.remove();
  document.getElementById('agent-count').textContent = String(agents.size);
  if (agents.size === 0) {
    agentsEl.innerHTML = '<div class="empty">.claude/agents/ is empty.</div>';
  }
  scheduleGraphRender();
}

let renderTimer = null;
function scheduleGraphRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => { renderTimer = null; renderGraph(); }, 150);
}

let renderId = 0;
async function renderGraph() {
  const myId = ++renderId;
  const nodes = new Set(agents.keys());
  for (const k of edges.keys()) {
    const [from, to] = k.split('->');
    nodes.add(from); nodes.add(to);
  }
  if (nodes.size === 0) {
    graphEl.innerHTML = '<div class="empty">No agents on stage yet.</div>';
    return;
  }

  const safe = (n) => 'n_' + n.replace(/[^a-zA-Z0-9]/g, '_');
  let src = 'graph TD\n';
  for (const n of nodes) {
    const id = safe(n);
    const label = n.replace(/"/g, '');
    src += `  ${id}["${label}"]\n`;
    src += `  style ${id} fill:${colorOf(n)},stroke:#1a1a1a,stroke-width:2px,color:#0d1017,font-weight:bold\n`;
  }
  for (const k of edges.keys()) {
    const [from, to] = k.split('->');
    const count = edges.get(k);
    src += `  ${safe(from)} -.->|${count}| ${safe(to)}\n`;
  }

  try {
    const { svg } = await mermaid.render('mermaid-svg-' + myId, src);
    if (myId !== renderId) return; // a newer render started
    graphEl.innerHTML = svg;
  } catch (err) {
    console.error('mermaid render error:', err);
  }
}

const es = new EventSource('/events');
es.addEventListener('chat',     e => addMessage(JSON.parse(e.data)));
es.addEventListener('decision', e => addDecision(JSON.parse(e.data)));
es.addEventListener('agent-file',         e => addAgent(JSON.parse(e.data)));
es.addEventListener('agent-file-removed', e => removeAgent(JSON.parse(e.data)));
es.onerror = () => console.warn('SSE: error, will auto-reconnect');
</script>
</body>
</html>
